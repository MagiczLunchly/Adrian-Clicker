<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrians Casino</title>

<script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>

<style>
body{
margin:0;
background:radial-gradient(circle,#111,#000);
color:gold;
font-family:Arial;
text-align:center;
}
button{
background:black;
border:2px solid gold;
color:gold;
padding:8px 15px;
margin:5px;
cursor:pointer;
}
#container{
display:flex;
justify-content:center;
gap:50px;
margin-top:20px;
}
#slotBox,#leaderboardBox{
background:#111;
border:3px solid gold;
padding:20px;
border-radius:15px;
width:260px;
}
#mainImage{
width:250px;
border-radius:20px;
cursor:pointer;
box-shadow:0 0 30px red;
}
.floating{
position:absolute;
color:lime;
font-weight:bold;
animation:floatUp 0.7s forwards;
pointer-events:none;
}
@keyframes floatUp{
from{opacity:1;transform:translateY(0);}
to{opacity:0;transform:translateY(-80px);}
}
#adminPanel{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:3px solid red;
padding:20px;
z-index:9999;
width:320px;
box-shadow:0 0 40px red;
}
</style>
</head>
<body>

<h1>🎰 ADRIAN CLICKER 🎰</h1>

<div>
Adrains: <span id="score">0</span> |
Rebirths: <span id="rebirths">0</span>
</div>

<div id="container">

<div>
<img id="mainImage" src="https://i.ibb.co/KzpvPDv5/IMG-20260224-122424.jpg">

<div>
<button onclick="buyAuto()">Auto (<span id="autoCost">50</span>)</button><br>
<button onclick="buyMulti()">Multiplier (<span id="multiCost">100</span>)</button><br>
<button onclick="rebirth()">Rebirth (<span id="rebirthCost">10000</span>)</button>
</div>
</div>

<div>

<div id="slotBox">
<h3>SPIN</h3>
<div id="slotDisplay">🎰 | 🎰 | 🎰</div>
<input id="betAmount" placeholder="Enter bet or code">
<button onclick="spinSlot()">SPIN</button>
<div id="slotResult"></div>
</div>

<div id="leaderboardBox" style="margin-top:20px;">
<h3>LEADERBOARD</h3>
<div>You: <span id="currentUsername"></span></div>
<div id="leaderboardList">Loading...</div>
</div>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h3 style="color:red;">ADMIN PANEL</h3>

<button onclick="adminAddSelf()">+10 Rebirths (You)</button><br><br>

<input id="targetUser" placeholder="Username"><br><br>

<button onclick="adminAddOther()">+10 Rebirths (User)</button><br><br>

<button onclick="adminBan()">BAN USER</button><br><br>

<button onclick="closeAdmin()">Close</button>

<div id="adminMsg" style="margin-top:10px;color:lime;"></div>
</div>

<script>

/* SUPABASE */
const SUPABASE_URL="https://ejxivungfjeqtvnpneja.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeGl2dW5nZmplcXR2bnBuZWphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDY4ODAsImV4cCI6MjA4NzYyMjg4MH0.L2Xyi2D-nI53mLZo1ZwJ1GDGZCM96gUD6dQBt2D7c5w";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* GAME STATE */
let username=null;
let score=0;
let multiplier=1;
let autoClickers=0;
let autoCost=50;
let multiCost=100;
let rebirths=0;
let rebirthCost=10000;
let isAdmin=false;

/* ELEMENTS */
const scoreEl=document.getElementById("score");
const rebirthEl=document.getElementById("rebirths");
const autoCostEl=document.getElementById("autoCost");
const multiCostEl=document.getElementById("multiCost");
const rebirthCostEl=document.getElementById("rebirthCost");
const slotDisplay=document.getElementById("slotDisplay");
const slotResult=document.getElementById("slotResult");
const leaderboardListEl=document.getElementById("leaderboardList");
const usernameDisplayEl=document.getElementById("currentUsername");

/* UPDATE UI */
function updateUI(){
scoreEl.textContent=Math.floor(score);
rebirthEl.textContent=rebirths;
autoCostEl.textContent=autoCost;
multiCostEl.textContent=multiCost;
rebirthCostEl.textContent=rebirthCost;
}

/* CLICK */
document.getElementById("mainImage").onclick=(e)=>{
let gain=multiplier*(1+rebirths);
score+=gain;
createFloating(e.clientX,e.clientY,"+"+gain);
updateUI();
};

/* FLOAT */
function createFloating(x,y,text){
const el=document.createElement("div");
el.className="floating";
el.style.left=x+"px";
el.style.top=y+"px";
el.textContent=text;
document.body.appendChild(el);
setTimeout(()=>el.remove(),700);
}

/* SHOP */
function buyAuto(){
if(score>=autoCost){
score-=autoCost;
autoClickers++;
autoCost*=2;
updateUI();
}
}
function buyMulti(){
if(score>=multiCost){
score-=multiCost;
multiplier++;
multiCost*=2;
updateUI();
}
}
function rebirth(){
if(score>=rebirthCost){
score=0;
rebirths++;
multiplier=1;
autoClickers=0;
autoCost=50;
multiCost=100;
rebirthCost*=2;
updateUI();
syncPlayer();
}
}

/* AUTO */
setInterval(()=>{
score+=autoClickers*multiplier*(1+rebirths);
updateUI();
},500);

/* SLOT */
const symbols=["💎","💰","🔥","🍀","⭐","🎰","👑","💀"];
function spinSlot(){
let input=document.getElementById("betAmount").value.trim().toUpperCase();

/* ADMIN UNLOCK */
if(input==="ADMIN1"){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
slotResult.textContent="ADMIN MODE ACTIVATED";
return;
}

/* NORMAL BET */
let bet=parseInt(input);
if(isNaN(bet)||bet<=0){slotResult.textContent="Invalid bet.";return;}
if(bet>score){slotResult.textContent="Not enough Adrains.";return;}

score-=bet;
updateUI();

let spins=0;
const spinInterval=setInterval(()=>{
let e1=symbols[Math.floor(Math.random()*symbols.length)];
let e2=symbols[Math.floor(Math.random()*symbols.length)];
let e3=symbols[Math.floor(Math.random()*symbols.length)];
slotDisplay.innerText=`${e1} | ${e2} | ${e3}`;
spins++;
if(spins>20){
clearInterval(spinInterval);
if(Math.random()<0.02){
let payout=bet*100;
score+=payout;
slotDisplay.innerText="💎 | 💎 | 💎";
slotResult.textContent="JACKPOT +" + payout;
}else{
slotResult.textContent="House wins.";
}
updateUI();
}
},70);
}

/* ADMIN FUNCTIONS */
function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function adminAddSelf(){
rebirths+=10;
updateUI();
syncPlayer();
document.getElementById("adminMsg").textContent="Added 10 rebirths to YOU.";
}

async function adminAddOther(){
let target=document.getElementById("targetUser").value.trim();
if(!target) return;

const {data}=await supabaseClient
.from("leaderboard")
.select("rebirths")
.eq("username",target)
.single();

if(!data){
document.getElementById("adminMsg").textContent="User not found.";
return;
}

await supabaseClient
.from("leaderboard")
.update({rebirths:data.rebirths+10})
.eq("username",target);

document.getElementById("adminMsg").textContent="Added 10 rebirths to "+target;
fetchLeaderboard();
}

async function adminBan(){
let target=document.getElementById("targetUser").value.trim();
if(!target) return;

await supabaseClient
.from("leaderboard")
.update({banned:true})
.eq("username",target);

document.getElementById("adminMsg").textContent=target+" has been banned.";
fetchLeaderboard();
}

/* BAN CHECK */
async function checkIfBanned(){
const {data}=await supabaseClient
.from("leaderboard")
.select("banned")
.eq("username",username)
.single();

if(data && data.banned){
document.body.innerHTML="<h1 style='color:red;margin-top:200px;'>YOU ARE BANNED</h1>";
}
}

/* LEADERBOARD */
async function fetchLeaderboard(){
const {data}=await supabaseClient
.from("leaderboard")
.select("username,rebirths")
.eq("banned",false)
.order("rebirths",{ascending:false})
.limit(20);

let html="";
data.forEach((row,index)=>{
html+=`<div>${index+1}. ${row.username} — ${row.rebirths}</div>`;
});
leaderboardListEl.innerHTML=html;
}

/* SAVE PLAYER */
async function syncPlayer(){
await supabaseClient
.from("leaderboard")
.upsert({username:username,rebirths:rebirths,banned:false},{onConflict:"username"});
}

/* INIT */
window.onload=async()=>{
username=localStorage.getItem("adrianUsername");
if(!username){
username=prompt("Enter username:");
localStorage.setItem("adrianUsername",username);
}
usernameDisplayEl.textContent=username;
await syncPlayer();
await checkIfBanned();
fetchLeaderboard();
updateUI();
};

</script>
</body>
</html>
